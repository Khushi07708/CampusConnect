<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect | Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            <span class="campus">Campus</span><span class="connect">Connect</span>
        </div>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="notes.html" class="active">Notes</a>
            <a href="books.html">Books</a>
            <a href="food.html">Food</a>
            <a href="rooms.html">Rooms</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <!-- Hero -->
    <section class="hero" style="min-height:40vh;">

        <div class="hero-content">

            <h6>Notes Sharing</h6>

            <p1>
                Upload your study materials and help your classmates succeed.
            </p1>

        </div>

    </section>

    <!-- Upload Form -->

    <div class="container">

        <div class="card">

            <h2>Upload Notes</h2>

            <form id="notesForm">

                <label>Subject</label>

                <select id="subject" required>

                    <option value="">Select Subject</option>

                    <option>Mathematics</option>

                    <option>Physics</option>

                    <option>Chemistry</option>

                    <option>Computer Science</option>

                    <option>Operating Research</option>

                </select>

                <label>Title</label>

                <input
                    type="text"
                    id="title"
                    placeholder="Enter Notes Title"
                    required>

                <label>Semester</label>

                <input
                    type="text"
                    id="semester"
                    placeholder="Semester">
                <label>Description</label>
                <textarea
    id="description"
    placeholder="Enter description (optional)">
</textarea>    

                <label>Upload File</label>

                <input
                    type="file"
                    id="file">

                <button
                    type="submit"
                    class="btn">

                    Upload Notes

                </button>

            </form>

        </div>

    </div>

    <!-- Search -->

    <div class="container">

        <input
            type="text"
            id="search"
            placeholder="Search Notes...">

    </div>

    <!-- Notes Table -->

    <div class="container">

        <div class="card">

            <h2>Available Notes</h2>

            <table id="notesTable">

                <thead>

                    <tr>

                        <th>Subject</th>

                        <th>Title</th>

                        <th>Semester</th>

                        <th>File</th>

                        <th>uploaded by</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <h3>CampusConnect</h3>

        <p>© 2026 CampusConnect. All Rights Reserved.</p>

    </footer>

    <script src="notes.js"></script>

</body>

</html>
